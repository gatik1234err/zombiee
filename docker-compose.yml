services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: zaddp
      POSTGRES_USER: zaddp
      POSTGRES_PASSWORD: zaddp_secret_2024
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: on-failure
    environment:
      DATABASE_URL: postgresql+asyncpg://zaddp:zaddp_secret_2024@db:5432/zaddp
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: hackathon-demo-secret-key-2024
      ENVIRONMENT: production

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: http://localhost:8000
      NEXTAUTH_SECRET: hackathon-demo-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
